name: Generate Tech News Post V2

on:
  workflow_dispatch:
  schedule:
    - cron: "15 0,6,12,18 * * *"

permissions:
  contents: write

concurrency:
  group: tech-news-generator-v2
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Force latest remote state
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate posts with verified news photos only
        run: python strict_runner.py

      - name: Upload generated posts
        uses: actions/upload-artifact@v4
        with:
          name: instagram-posts-v2-${{ github.run_number }}
          path: output/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit and safely push generated posts
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output state.json

          if git diff --cached --quiet; then
            echo "No new photo-based posts to commit."
            exit 0
          fi

          git commit -m "Generate photo-based tech news Instagram posts"

          for attempt in 1 2 3 4 5; do
            git fetch origin main

            if ! git rebase origin/main; then
              git checkout --theirs output state.json || true
              git add output state.json
              GIT_EDITOR=true git rebase --continue || {
                git rebase --abort
                echo "Rebase conflict could not be resolved."
                exit 1
              }
            fi

            if git push origin HEAD:main; then
              echo "Generated posts pushed successfully."
              exit 0
            fi

            echo "Push attempt ${attempt} failed; retrying."
            sleep $((attempt * 5))
          done

          echo "Unable to push after five attempts."
          exit 1
