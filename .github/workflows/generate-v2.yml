name: Generate Tech News Post V2

on:
  workflow_dispatch:
  schedule:
    - cron: "15 0,6,12,18 * * *"

permissions:
  contents: write

concurrency:
  group: tech-news-generator-v2
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Force latest remote state
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate fresh posts with verified news photos only
        run: python strict_runner.py

      - name: Check files created in this run
        id: new_posts
        shell: bash
        run: |
          if find run-output -type f -print -quit 2>/dev/null | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            echo "Files generated in this run:"
            find run-output -type f -sort
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=No new images::No fresh article with a valid news photo was generated. Check history/news-log.jsonl for the run log."
          fi

      - name: Upload only posts created in this run
        if: steps.new_posts.outputs.has_files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: new-instagram-posts-${{ github.run_number }}
          path: run-output/
          if-no-files-found: error
          retention-days: 30

      - name: Commit latest posts and permanent news history
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # -A records newly generated files, history updates, and deletion of old output files.
          git add -A -- state.json output history

          if git diff --cached --quiet; then
            echo "No state, history, or generated-file changes to commit."
            exit 0
          fi

          git commit -m "Update fresh tech news posts and history"

          for attempt in 1 2 3 4 5; do
            git fetch origin main

            if ! git rebase origin/main; then
              git checkout --theirs state.json output history || true
              git add -A -- state.json output history
              GIT_EDITOR=true git rebase --continue || {
                git rebase --abort
                echo "Rebase conflict could not be resolved."
                exit 1
              }
            fi

            if git push origin HEAD:main; then
              echo "Latest posts and news history pushed successfully."
              exit 0
            fi

            echo "Push attempt ${attempt} failed; retrying."
            sleep $((attempt * 5))
          done

          echo "Unable to push after five attempts."
          exit 1
