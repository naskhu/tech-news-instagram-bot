name: Publish to Instagram

on:
  workflow_run:
    workflows:
      - Generate Tech News Post V2
      - Generate Tech News Posts
    types: [completed]
  workflow_dispatch:
    inputs:
      max_posts:
        description: Maximum unpublished posts to publish
        required: false
        default: "1"
  schedule:
    # Random daytime publisher: every hour 09:00–23:00 Maldives time (UTC+5).
    # Minute 23 keeps it off the top of the hour; choose_publish_plan.py may skip.
    - cron: "23 4-18 * * *"

permissions:
  contents: write

concurrency:
  group: instagram-publisher
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out latest generated content from git
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main commit
        run: |
          git fetch origin main
          git reset --hard origin/main
          echo "Publishing from commit $(git rev-parse --short HEAD)"
          echo "Queued PNGs under output/:"
          find output -type f -name '*.png' 2>/dev/null | sort || true

      - name: Choose random schedule plan and publish limit
        id: plan
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          MANUAL_MAX_POSTS: ${{ inputs.max_posts || '1' }}
        run: python3 choose_publish_plan.py

      - name: Set up Python
        if: steps.plan.outputs.should_publish == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install publisher dependency
        if: steps.plan.outputs.should_publish == 'true'
        run: python -m pip install --disable-pip-version-check requests==2.32.4

      - name: Publish unpublished git-committed posts via Buffer
        if: steps.plan.outputs.should_publish == 'true'
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
          MAX_POSTS_PER_RUN: ${{ steps.plan.outputs.max_posts }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: main
        run: |
          echo "Pending unpublished posts: ${{ steps.plan.outputs.pending }}"
          echo "Publishing up to ${{ steps.plan.outputs.max_posts }} post(s)"
          echo "Plan reason: ${{ steps.plan.outputs.reason }}"
          python instagram_publish.py

      - name: Commit Instagram publishing state to git
        if: steps.plan.outputs.should_publish == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add instagram-posted.json

          if git diff --cached --quiet; then
            echo "No publishing-state change to commit."
            exit 0
          fi

          git commit -m "Record published Instagram post"

          for attempt in 1 2 3 4 5; do
            git fetch origin main

            if ! git rebase origin/main; then
              # Keep the newly written local publish state on conflict.
              git checkout --ours instagram-posted.json || true
              git add instagram-posted.json
              GIT_EDITOR=true git rebase --continue || {
                git rebase --abort
                echo "Rebase conflict could not be resolved."
                exit 1
              }
            fi

            if git push origin HEAD:main; then
              echo "Publishing state pushed to git successfully."
              exit 0
            fi

            echo "Push attempt ${attempt} failed; retrying."
            sleep $((attempt * 5))
          done

          echo "Unable to push publishing state after five attempts."
          exit 1
