name: Publish to Instagram

on:
  workflow_run:
    workflows:
      - Generate Tech News Post V2
      - Generate Tech News Posts
    types: [completed]
  workflow_dispatch:
    inputs:
      max_posts:
        description: Maximum unpublished posts to publish
        required: false
        default: "1"
  schedule:
    # Backup schedule: 09:17, 15:17 and 21:17 Maldives time (UTC+5).
    - cron: "17 4,10,16 * * *"

permissions:
  contents: write

concurrency:
  group: instagram-publisher
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out latest generated content from git
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest main commit
        run: |
          git fetch origin main
          git reset --hard origin/main
          echo "Publishing from commit $(git rev-parse --short HEAD)"
          echo "Queued PNGs under output/:"
          find output -type f -name '*.png' 2>/dev/null | sort || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install publisher dependency
        run: python -m pip install --disable-pip-version-check requests==2.32.4

      - name: Publish next unpublished git-committed post
        env:
          INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          META_GRAPH_API_VERSION: ${{ vars.META_GRAPH_API_VERSION || 'v23.0' }}
          MAX_POSTS_PER_RUN: ${{ inputs.max_posts || '1' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: main
        run: python instagram_publish.py

      - name: Commit Instagram publishing state to git
        run: |
          set -euo pipefail

          if git diff --quiet -- instagram-posted.json; then
            echo "No publishing-state change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add instagram-posted.json
          git commit -m "Record published Instagram post"

          for attempt in 1 2 3 4 5; do
            git fetch origin main

            if ! git rebase origin/main; then
              git checkout --theirs instagram-posted.json || true
              git add instagram-posted.json
              GIT_EDITOR=true git rebase --continue || {
                git rebase --abort
                echo "Rebase conflict could not be resolved."
                exit 1
              }
            fi

            if git push origin HEAD:main; then
              echo "Publishing state pushed to git successfully."
              exit 0
            fi

            echo "Push attempt ${attempt} failed; retrying."
            sleep $((attempt * 5))
          done

          echo "Unable to push publishing state after five attempts."
          exit 1
