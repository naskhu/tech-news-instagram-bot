name: Publish to Instagram

on:
  workflow_run:
    workflows: ["Generate Tech News Post"]
    types: [completed]
  workflow_dispatch:
    inputs:
      max_posts:
        description: Maximum unpublished posts to publish
        required: false
        default: "1"
  schedule:
    # Backup schedule: 09:17, 15:17 and 21:17 Maldives time.
    - cron: "17 9,15,21 * * *"
      timezone: "Indian/Maldives"

permissions:
  contents: write

concurrency:
  group: instagram-publisher
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out latest generated content
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install publisher dependency
        run: python -m pip install --disable-pip-version-check requests==2.32.4

      - name: Publish next unpublished post
        env:
          INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          META_GRAPH_API_VERSION: ${{ vars.META_GRAPH_API_VERSION || 'v23.0' }}
          MAX_POSTS_PER_RUN: ${{ inputs.max_posts || '1' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: main
        run: python instagram_publish.py

      - name: Save Instagram publishing state
        run: |
          if git diff --quiet -- instagram-posted.json; then
            echo "No publishing-state change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add instagram-posted.json
          git commit -m "Record published Instagram post"
          git pull --rebase origin main
          git push origin HEAD:main
