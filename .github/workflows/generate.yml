name: Generate Tech News Posts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - config.json
      - feed_sources.py
      - strict_runner.py
      - requirements.txt
      - .github/workflows/generate.yml
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

concurrency:
  group: tech-news-generator-main
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out latest main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Synchronize repository
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Audit all sources and generate new posts
        run: python strict_runner.py

      - name: Upload current-run posts and source audit
        uses: actions/upload-artifact@v4
        with:
          name: instagram-posts-${{ github.run_number }}
          path: |
            run-output/
            history/source-audit.json
            history/news-log.jsonl
          if-no-files-found: warn
          retention-days: 30

      - name: Commit and safely push state, history and posts
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A output state.json history/news-log.jsonl history/source-audit.json

          if git diff --cached --quiet; then
            echo "No repository changes to commit."
            exit 0
          fi

          git commit -m "Audit sources and generate tech news posts"

          for attempt in 1 2 3 4 5; do
            echo "Push attempt ${attempt} of 5"
            git fetch origin main

            if ! git rebase -X theirs origin/main; then
              git rebase --abort || true
              echo "Rebase failed. Retrying from the latest remote state."
              sleep $((attempt * 4))
              continue
            fi

            if git push origin HEAD:main; then
              echo "Generated posts and audit pushed successfully."
              exit 0
            fi

            echo "Remote changed again; retrying."
            sleep $((attempt * 4))
          done

          echo "Unable to push generated posts after five attempts."
          exit 1
