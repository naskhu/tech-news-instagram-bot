name: Generate Tech News Post

on:
  workflow_dispatch:
  schedule:
    - cron: "15 0,6,12,18 * * *"

permissions:
  contents: write

concurrency:
  group: tech-news-generator-main
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out latest main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Synchronize repository
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate post-ready files
        run: python bot.py

      - name: Upload generated posts
        uses: actions/upload-artifact@v4
        with:
          name: instagram-posts-${{ github.run_number }}
          path: output/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit and safely push new posts
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output state.json

          if git diff --cached --quiet; then
            echo "No new posts to commit."
            exit 0
          fi

          git commit -m "Generate tech news Instagram posts"

          for attempt in 1 2 3 4 5; do
            echo "Push attempt ${attempt} of 5"
            git fetch origin main

            # Replay this generated-post commit on top of the newest main.
            # For generated output/state conflicts, retain this run's version.
            if ! git rebase -X theirs origin/main; then
              git rebase --abort || true
              echo "Rebase failed. Retrying from the latest remote state."
              sleep $((attempt * 4))
              continue
            fi

            if git push origin HEAD:main; then
              echo "Generated posts pushed successfully."
              exit 0
            fi

            echo "Remote changed again; retrying."
            sleep $((attempt * 4))
          done

          echo "Unable to push generated posts after five attempts."
          exit 1
