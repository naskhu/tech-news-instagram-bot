name: Generate Tech News Post

on:
  workflow_dispatch:
  schedule:
    - cron: "15 0,6,12,18 * * *"

permissions:
  contents: write

concurrency:
  group: tech-news-generator
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate post-ready files
        run: python bot.py

      - name: Upload generated posts
        uses: actions/upload-artifact@v4
        with:
          name: instagram-posts-${{ github.run_number }}
          path: output/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit new posts and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output state.json
          if git diff --cached --quiet; then
            echo "No new posts to commit."
            exit 0
          fi
          git commit -m "Generate tech news Instagram posts"
          git push
